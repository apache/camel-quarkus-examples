# Configure test class ordering to use @Order annotation as secondary ordering
# Quarkus uses a primary orderer to group tests by profile, then this secondary
# orderer applies @Order within each profile group.
# Required because SunJSSE static initialization must happen with fallback config first.
junit.quarkus.orderer.secondary-orderer=org.junit.jupiter.api.ClassOrderer$OrderAnnotation
