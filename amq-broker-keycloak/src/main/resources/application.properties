# Camel
camel.context.name = amq-broker-keycloak-example

# AMQ Artemis (dev services auto-start)
%prod.quarkus.artemis.url=tcp://localhost:61616
%prod.quarkus.artemis.username=admin
%prod.quarkus.artemis.password=admin

# Production HTTP port
%prod.quarkus.http.port=8081

# Keycloak OIDC
%prod.quarkus.oidc.auth-server-url=http://localhost:8082/realms/quarkus
quarkus.oidc.client-id=quarkus-client
quarkus.oidc.application-type=service

# Keycloak Dev Services
quarkus.keycloak.devservices.port=8082
quarkus.keycloak.devservices.users.customer=customer-pass
quarkus.keycloak.devservices.roles.customer=customer-role
quarkus.keycloak.devservices.users.admin=admin-pass
quarkus.keycloak.devservices.roles.admin=admin-role

# HTTP Security - REST endpoints protected by Quarkus OIDC
quarkus.http.auth.permission.customer.paths=/api/orders/*
quarkus.http.auth.permission.customer.policy=authenticated
quarkus.http.auth.permission.admin.paths=/api/admin/*
quarkus.http.auth.permission.admin.policy=admin-policy
quarkus.http.auth.policy.admin-policy.roles-allowed=admin-role

# Keycloak Component Configuration (for Camel Keycloak component)
camel.component.keycloak.server-url=http://localhost:8082
camel.component.keycloak.realm=quarkus
camel.component.keycloak.client-id=quarkus-client
camel.component.keycloak.client-secret=${QUARKUS_OIDC_CREDENTIALS_SECRET:secret}

# CXF SOAP
quarkus.cxf.path=/services
soap.inventory.client.address=http://localhost:8081/services/inventory

# Kubernetes
quarkus.kubernetes.env.secrets=quarkus-keycloak

# Dev Configuration
%dev.quarkus.artemis.devservices.enabled=true
%dev.soap.inventory.client.address=http://localhost:8080/services/inventory

# Test Configuration
%test.quarkus.artemis.devservices.enabled=true
%test.soap.inventory.client.address=http://localhost:8081/services/inventory

# Native Configuration
quarkus.native.additional-build-args=--initialize-at-run-time=org.springframework.jms.listener.AbstractMessageListenerContainer$ObservationFactory
